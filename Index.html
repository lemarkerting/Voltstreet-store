<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoltStreet</title><script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#0a0a0a;color:#fff}
header{padding:15px;background:#111;text-align:center}
header h1{color:gold}
.hero{text-align:center;padding:20px}
.container{padding:15px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:#111;border-radius:10px;overflow:hidden;cursor:pointer}
.card img{width:100%;height:140px;object-fit:cover}
.card-content{padding:10px}
.price{color:gold}
.meta{font-size:12px;opacity:.8}
.badge{background:red;color:#fff;padding:2px 6px;border-radius:4px;font-size:11px;margin-right:5px}
.btn{background:gold;color:#000;padding:10px;border:none;border-radius:6px;width:100%;margin-top:8px;font-weight:bold}
input,textarea{width:100%;padding:10px;margin:8px 0;border-radius:5px;border:none}
#cart p{margin:5px 0}
.whatsapp{
position:fixed;bottom:20px;right:20px;
background:#25D366;color:white;padding:12px 15px;border-radius:50px;text-decoration:none;font-size:14px
}
.modal{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000000cc;justify-content:center;align-items:center
}
.modal-content{
background:#111;padding:20px;border-radius:10px;width:90%;max-width:400px
}
</style></head><body><header>
<h1>VoltStreet</h1>
<p>Premium Sneakers & iPhones</p>
</header><section class="hero">
<h2>Limited Stock • Fast Delivery</h2>
<p>Secure orders • Trusted quality</p>
</section><div class="container"><h2>👟 Sneakers</h2>
<div class="grid"><div class="card" onclick="openProduct('Air Force 1',1499,'2–4 days','Only 3 left')">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<div class="card-content">
<span class="badge">HOT</span>
<h3>Air Force 1</h3>
<p class="price">R1499</p>
<p class="meta">🚚 2–4 days • Only 3 left</p>
</div></div><div class="card" onclick="openProduct('iPhone 11',5500,'3–5 days','Only 2 left')">
<img src="https://images.unsplash.com/photo-1592750475338-74b7b21085ab">
<div class="card-content">
<span class="badge">LOW STOCK</span>
<h3>iPhone 11</h3>
<p class="price">R5500</p>
<p class="meta">📦 3–5 days • Only 2 left</p>
</div></div></div><h2 style="margin-top:20px">🛒 Cart</h2>
<div id="cart"></div><h2 style="margin-top:20px">Checkout</h2>
<form id="orderForm">
<input type="text" id="name" placeholder="Full Name" required>
<input type="email" id="email" placeholder="Email" required>
<textarea id="address" placeholder="Delivery Address" required></textarea>
<input type="file" required>
<button class="btn">Submit Order</button>
</form></div><!-- PRODUCT MODAL --><div class="modal" id="productModal">
<div class="modal-content">
<h3 id="pName"></h3>
<p id="pPrice"></p>
<p id="pDelivery"></p>
<p id="pStock"></p>
<button class="btn" onclick="addSelected()">Add to Cart</button>
<button class="btn" onclick="closeModal()">Close</button>
</div>
</div><a class="whatsapp" href="https://wa.me/27XXXXXXXXX" target="_blank">Chat</a>

<script>
(function(){emailjs.init("YOUR_PUBLIC_KEY")})();

let cart=[];
let selectedProduct={};

function addToCart(name,price){cart.push({name,price});displayCart();}

function displayCart(){let total=0,html='';cart.forEach(i=>{html+=`<p>${i.name} - R${i.price}</p>`;total+=i.price});html+=`<h3>Total: R${total}</h3>`;document.getElementById('cart').innerHTML=html}

function openProduct(name,price,delivery,stock){
selectedProduct={name,price};
document.getElementById('pName').innerText=name;
document.getElementById('pPrice').innerText='Price: R'+price;
document.getElementById('pDelivery').innerText='Delivery: '+delivery;
document.getElementById('pStock').innerText=stock;
document.getElementById('productModal').style.display='flex';
}

function closeModal(){document.getElementById('productModal').style.display='none'}

function addSelected(){addToCart(selectedProduct.name,selectedProduct.price);closeModal();}


document.getElementById("orderForm").addEventListener("submit",function(e){
e.preventDefault();
let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let address=document.getElementById("address").value;
let total=cart.reduce((s,i)=>s+i.price,0);

emailjs.send("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",{
customer_name:name,customer_email:email,address:address,total:total,message:"Order confirmed. Delivery 7-12 days"
}).then(()=>{alert("Order placed! Check email");cart=[];displayCart()})
});
</script></body>
</html>
